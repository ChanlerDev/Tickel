name: Release merged PR

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      level:
        description: Release level
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        (
          contains(github.event.pull_request.labels.*.name, 'release:patch') ||
          contains(github.event.pull_request.labels.*.name, 'release:minor') ||
          contains(github.event.pull_request.labels.*.name, 'release:major')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - run: git switch -C main origin/main

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --frozen-lockfile

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve release level
        id: release-level
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          INPUT_LEVEL: ${{ github.event.inputs.level }}
        run: |
          if [ -n "$INPUT_LEVEL" ]; then
            echo "level=$INPUT_LEVEL" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"release:major"'; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"release:minor"'; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - run: pnpm agent:release ${{ steps.release-level.outputs.level }}
